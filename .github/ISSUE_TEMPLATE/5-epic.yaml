name: Epic
description: >-
  Initiative produit autour d'un problème spécifique, avec un objectif clair,
  prête à être découpée en User Stories
type: "Epic"
body:
  - type: dropdown
    id: epic_origin
    attributes:
      label: Origine
      description: Source du besoin
      options:
        - Demande client
        - Retour utilisateur
        - Bug ou anomalie
        - Initiative interne
    validations:
      required: true
  - type: input
    id: epic_reference
    attributes:
      label: Référence externe
      description: Lien vers ticket, discussion ou contexte d'origine
      placeholder: https://zammad.zos-informationsystem.com/#ticket/zoom/{ticket_number}
    validations:
      required: true
  - type: textarea
    id: epic_problem
    attributes:
      label: Problème
      description: >-
        Quel problème cherche-t-on à résoudre ? Pour qui ? Dans quelles
        circonstances ?
    validations:
      required: true
  - type: textarea
    id: epic_goal
    attributes:
      label: Objectif
      description: Quel résultat concret veut-on atteindre ?
    validations:
      required: true
  - type: textarea
    id: epic_impact
    attributes:
      label: Impact
      description: Pourquoi est-ce important ? Quelle valeur ajoutée ?
    validations:
      required: true
  - type: textarea
    id: epic_scope
    attributes:
      label: Portée
      description: Ce qui est inclus à ce stade
    validations:
      required: true
  - type: textarea
    id: epic_success
    attributes:
      label: Critères de succès
      description: Comment est mesurée la réussite ?
    validations:
      required: true
  - type: textarea
    id: epic_stories
    attributes:
      label: User stories
      description: Liste des user stories liées (à compléter progressivement)
  - type: textarea
    id: epic_risk
    attributes:
      label: Risques
      description: Points de vigilance, dépendances, zones floues
