name: Send Slack message on conflict ('dev-pull-requests' channel)

on:
  pull_request:
    types: [synchronize, reopened, opened]

jobs:
  check-conflict:
    runs-on: ubuntu-latest
    outputs:
      has_conflict: ${{ steps.check.outputs.has_conflict }}
    steps:
      - name: Check PR mergeability
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const status = pr.data.mergeable_state;
            console.log(`Mergeable state: ${status}`);

            const hasConflict = status === "dirty";
            core.setOutput("has_conflict", hasConflict.toString());

  notify-conflict:
    if: needs.check-conflict.outputs.has_conflict == 'true'
    needs: check-conflict
    uses: ZOS-IS/ToolBox/.github/workflows/reusable-notify-send_notification_slack.yml@main
    with:
      slack_channel: "dev-pull-requests"
      title: "Conflit détecté dans une pull request"
      message: |
        *Titre*: ${{ github.event.pull_request.title }}
        *Dépôt* : ${{ github.event.repository.name }}
        *Lien* : <${{ github.event.pull_request.html_url }}>
        *Auteur*: <https://github.com/${{ github.event.pull_request.user.login }}>
    secrets: inherit
